<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 100 100" preserveAspectRatio="none" style="display:block;position:fixed;inset:0;width:100vw;height:100vh;">
  <foreignObject x="0" y="0" width="100" height="100">
    <body xmlns="http://www.w3.org/1999/xhtml" style="margin:0;width:100%;height:100%;overflow:hidden;background:transparent;">
      <iframe
        id="lucide-svg-app"
        title="Lucide SVG Build"
        src="./index.html#/"
        style="display:block;width:100%;height:100%;border:0;background:transparent;"
        referrerpolicy="same-origin"
        allow="clipboard-read; clipboard-write; fullscreen"
        allowfullscreen="allowfullscreen"
        webkitallowfullscreen="webkitallowfullscreen"
        mozallowfullscreen="mozallowfullscreen"
      ></iframe>
      <script type="application/ecmascript"><![CDATA[(function(){var iframe=document.getElementById("lucide-svg-app");var sync=function(){var target="./index.html"+(window.location.hash||"#/");if(iframe.getAttribute("data-src")===target){return;}iframe.setAttribute("data-src",target);iframe.setAttribute("src",target);};window.addEventListener("hashchange",sync);sync();})();]]></script>
    </body>
  </foreignObject>
</svg>
